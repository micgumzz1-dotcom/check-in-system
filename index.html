<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ลงเวลาทำงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
      body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
      .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
      #status { color: #555; margin-top: 15px; font-size: 13px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; white-space: pre-wrap; }
      .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00B900; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
      button { color: white; border: none; padding: 18px 10px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;}
      .btn-in { background-color: #00B900; }
      .btn-out { background-color: #ff4d4d; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📍 ระบบลงเวลาทำงาน</h2>
      <div id="loader" class="loader"></div>
      <div id="status">กำลังเริ่มต้นระบบ...</div>
      
      <div id="action-area" style="display: none;">
        <div class="btn-group" id="btn-group">
          <button class="btn-in" onclick="confirmAction('in')">ลงเวลาเข้างาน</button>
          <button class="btn-out" onclick="confirmAction('out')">ลงเวลาออกงาน</button>
        </div>
      </div>
    </div>

    <script>
      let userLineId = "";
      let logs = [];
      let actionType = ""; 

      const GAS_URL = "https://script.google.com/macros/s/AKfycbzcTs1RhuHfgjuRQP6lN9QEm7sYCa8QA74wDXhBNZnGMih3Dv6PImLjKiEVCHMG0eP6/exec";

      function updateLog(msg) {
        logs.push(msg);
        document.getElementById("status").innerHTML = logs.join("\n");
      }

      window.onload = function() {
        initializeLiff();
      };

      async function initializeLiff() {
        updateLog("1. กำลังโหลด LIFF SDK...");
        try {
          if (typeof liff === 'undefined') throw new Error("โหลดไฟล์ SDK ไม่สำเร็จ");

          await liff.init({ liffId: "2009956605-7f1hhecd" });
          updateLog("2. LIFF Init สำเร็จ");

          if (!liff.isLoggedIn()) {
            updateLog("3. ยังไม่ได้ล็อกอิน... กำลังพาไปหน้า Login");
            liff.login();
          } else {
            const profile = await liff.getProfile();
            userLineId = profile.userId;
            updateLog("3. สวัสดีคุณ " + profile.displayName + "\nกรุณากดปุ่มเพื่อลงเวลาเข้า/ออกงาน");
            document.getElementById("loader").style.display = "none";
            document.getElementById("action-area").style.display = "block";
          }
        } catch (err) {
          updateLog("❌ เกิดข้อผิดพลาด: " + err.message);
        }
      }

      // ฟังก์ชันเพิ่มหน้าต่างยืนยัน
      function confirmAction(type) {
        let actionText = type === 'in' ? "ลงเวลาเข้างาน" : "ลงเวลาออกงาน";
        let isConfirmed = confirm(`คุณยืนยันที่จะ ${actionText} ใช่หรือไม่?`);
        
        if (isConfirmed) {
          checkLocation(type);
        }
      }

      function checkLocation(type) {
        actionType = type;
        document.getElementById("btn-group").style.display = "none";
        document.getElementById("loader").style.display = "block";
        
        let actionText = type === 'in' ? "เข้างาน" : "ออกงาน";
        updateLog(`4. กำลังบันทึก [${actionText}]...`);

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            updateLog("5. ได้พิกัดแล้ว กำลังส่งข้อมูล...");
            sendData(pos);
          },
          (err) => {
            updateLog("❌ GPS Error: " + err.message);
            document.getElementById("btn-group").style.display = "flex";
          },
          { enableHighAccuracy: true }
        );
      }

      function sendData(pos) {
        // นำตัวแปร shift ออกไป เนื่องจากไม่ได้ใช้ในหน้านี้แล้ว
        let finalUrl = `${GAS_URL}?userId=${encodeURIComponent(userLineId)}&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&type=${actionType}&t=${new Date().getTime()}`;
        
        fetch(finalUrl, { method: 'GET' })
        .then(response => response.text())
        .then(data => {
          document.getElementById("loader").style.display = "none";
          updateLog(data.includes("สำเร็จ") ? "✅ " + data : "❌ " + data);
          
          if(data.includes("สำเร็จ")) {
             setTimeout(() => { liff.closeWindow(); }, 3000); 
          } else {
             document.getElementById("btn-group").style.display = "flex";
          }
        })
        .catch(error => {
          document.getElementById("loader").style.display = "none";
          updateLog("❌ Network Error: " + error.message);
          document.getElementById("btn-group").style.display = "flex";
        });
      }
    </script>
  </body>
</html>
