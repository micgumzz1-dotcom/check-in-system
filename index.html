<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ลงเวลาทำงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
      body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
      .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
      #status { color: #555; margin-top: 15px; font-size: 13px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; white-space: pre-wrap; }
      .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00B900; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-size: 16px; border: 1px solid #ccc; font-family: inherit; }
      .btn-group { display: flex; gap: 10px; margin-top: 10px; }
      button { color: white; border: none; padding: 15px 10px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;}
      .btn-in { background-color: #00B900; }
      .btn-out { background-color: #ff4d4d; }
      
      .info-box { text-align: left; font-size: 12px; color: #666; margin-bottom: 15px; background: #fff3cd; padding: 10px; border-radius: 5px; border-left: 4px solid #ffc107; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📍 ระบบลงเวลาทำงาน</h2>
      <div id="loader" class="loader"></div>
      <div id="status">กำลังเริ่มต้นระบบ...</div>
      
      <div id="action-area" style="display: none; margin-top: 20px;">
        <label style="display: block; text-align: left; margin-bottom: 5px; font-weight: bold;">เลือกช่วงเวลาลงงาน:</label>
        <select id="shiftType">
          <option value="morning">ช่วงเช้า (08:30 - 13:00)</option>
          <option value="afternoon">ช่วงบ่าย (12:30 - 17:00)</option>
          <option value="evening">ช่วงเย็น (16:00 - 20:30)</option>
          <option value="other">เวลาอื่นๆ (อิสระ)</option>
        </select>

        <div class="info-box">
          <b>เวลาที่ระบบอนุญาต (กะปกติ):</b><br>
          ✅ <b>เข้างาน:</b> กดได้ล่วงหน้า 30 นาที และหลังเข้างาน 45 นาที (เลย 15 นาที ถือว่าสาย)<br>
          ✅ <b>ออกงาน:</b> กดได้ก่อนเลิก 45 นาที และหลังเลิกงาน 90 นาที
        </div>

        <div class="btn-group" id="btn-group">
          <button class="btn-in" onclick="checkLocation('in')">ลงเวลาเข้างาน</button>
          <button class="btn-out" onclick="checkLocation('out')">ลงเวลาออกงาน</button>
        </div>
      </div>
    </div>

    <script>
      let userLineId = "";
      let logs = [];
      let actionType = ""; 

      const GAS_URL = "https://script.google.com/macros/s/AKfycbzcTs1RhuHfgjuRQP6lN9QEm7sYCa8QA74wDXhBNZnGMih3Dv6PImLjKiEVCHMG0eP6/exec";

      function updateLog(msg) {
        logs.push(msg);
        document.getElementById("status").innerHTML = logs.join("\n");
      }

      window.onload = function() {
        initializeLiff();
      };

      async function initializeLiff() {
        updateLog("1. กำลังโหลด LIFF SDK...");
        try {
          if (typeof liff === 'undefined') throw new Error("โหลดไฟล์ SDK ไม่สำเร็จ");

          await liff.init({ liffId: "2009956605-7f1hhecd" });
          updateLog("2. LIFF Init สำเร็จ");

          if (!liff.isLoggedIn()) {
            updateLog("3. ยังไม่ได้ล็อกอิน... กำลังพาไปหน้า Login");
            liff.login();
          } else {
            const profile = await liff.getProfile();
            userLineId = profile.userId;
            updateLog("3. สวัสดีคุณ " + profile.displayName + "\nกรุณาเลือกช่วงเวลา และกดปุ่มเข้า/ออกงาน");
            document.getElementById("loader").style.display = "none";
            document.getElementById("action-area").style.display = "block"; 
          }
        } catch (err) {
          updateLog("❌ เกิดข้อผิดพลาด: " + err.message);
        }
      }

      function checkLocation(type) {
        actionType = type;
        document.getElementById("btn-group").style.display = "none";
        document.getElementById("loader").style.display = "block";
        
        let shiftDropdown = document.getElementById("shiftType");
        let shiftText = shiftDropdown.options[shiftDropdown.selectedIndex].text;
        
        updateLog(type === 'in' ? `4. กำลังบันทึก [เข้างาน] ${shiftText}...` : `4. กำลังบันทึก [ออกงาน] ${shiftText}...`);

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            updateLog("5. ได้พิกัดแล้ว กำลังส่งข้อมูล...");
            sendData(pos);
          },
          (err) => {
            updateLog("❌ GPS Error: " + err.message);
            document.getElementById("btn-group").style.display = "flex";
          },
          { enableHighAccuracy: true }
        );
      }

      function sendData(pos) {
        let shiftType = document.getElementById("shiftType").value;
        // แนบ &shift= ไปกับ API ด้วย
        let finalUrl = `${GAS_URL}?userId=${encodeURIComponent(userLineId)}&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&type=${actionType}&shift=${shiftType}&t=${new Date().getTime()}`;
        
        fetch(finalUrl, { method: 'GET' })
        .then(response => response.text())
        .then(data => {
          document.getElementById("loader").style.display = "none";
          updateLog(data.includes("สำเร็จ") ? "✅ " + data : "❌ " + data);
          
          if(data.includes("สำเร็จ")) {
             setTimeout(() => { liff.closeWindow(); }, 3000); 
          } else {
             document.getElementById("btn-group").style.display = "flex";
          }
        })
        .catch(error => {
          document.getElementById("loader").style.display = "none";
          updateLog("❌ Network Error: " + error.message);
          document.getElementById("btn-group").style.display = "flex";
        });
      }
    </script>
  </body>
</html>
